<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
  <title id="title">Hogwarts victory</title>
  <desc id="desc">A Hogwarts house victory screen for a perfect spelling run.</desc>
  <rect width="720" height="520" fill="#1e1b4b"/>
  <rect x="32" y="32" width="656" height="456" rx="14" fill="#312e81" stroke="#fbbf24" stroke-width="8"/>
  <g opacity="0.95">
    <rect x="94" y="88" width="532" height="110" rx="12" fill="#111827" stroke="#a78bfa" stroke-width="6"/>
    <text x="360" y="134" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="700" fill="#fef3c7">HOUSE VICTORY</text>
    <text x="360" y="174" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#c4b5fd">10 / 10 SPELLING RUN</text>
  </g>
  <g transform="translate(180 250)">
    <rect x="0" y="0" width="72" height="96" rx="8" fill="#7f1d1d" stroke="#f8fafc" stroke-width="5"/>
    <rect x="96" y="0" width="72" height="96" rx="8" fill="#1d4ed8" stroke="#f8fafc" stroke-width="5"/>
    <rect x="192" y="0" width="72" height="96" rx="8" fill="#facc15" stroke="#111827" stroke-width="5"/>
    <rect x="288" y="0" width="72" height="96" rx="8" fill="#166534" stroke="#f8fafc" stroke-width="5"/>
  </g>
  <g transform="translate(244 404)">
    <rect x="0" y="0" width="232" height="54" rx="10" fill="#111827" stroke="#fbbf24" stroke-width="4"/>
    <text x="116" y="36" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#fef3c7">FOR HOGWARTS</text>
  </g>
</svg>
