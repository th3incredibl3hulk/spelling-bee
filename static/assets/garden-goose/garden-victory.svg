<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
  <title id="title">Garden job victory</title>
  <desc id="desc">A to-do list victory screen for a perfect Garden Goose spelling run.</desc>
  <rect width="720" height="520" fill="#dcfce7"/>
  <rect x="32" y="32" width="656" height="456" rx="20" fill="#0284c7" stroke="#164e63" stroke-width="8"/>
  <g opacity="0.95">
    <rect x="94" y="88" width="532" height="110" rx="14" fill="#f0f9ff" stroke="#164e63" stroke-width="8"/>
    <text x="360" y="134" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="36" font-weight="bold" fill="#164e63">GARDEN JOB DONE</text>
    <text x="360" y="174" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="28" font-weight="bold" fill="#f97316">10 / 10 SPELLING RUN</text>
  </g>
  <g transform="translate(300 250)">
    <ellipse cx="60" cy="50" rx="50" ry="34" fill="#ffffff" stroke="#164e63" stroke-width="6"/>
    <ellipse cx="60" cy="0" rx="32" ry="26" fill="#ffffff" stroke="#164e63" stroke-width="6"/>
    <path d="M88 0 L108 8 L88 16 Z" fill="#f97316" stroke="#164e63" stroke-width="4"/>
    <path d="M20 10 L0 0 L20 -10" fill="#fbbf24" stroke="#164e63" stroke-width="4"/>
  </g>
  <g transform="translate(244 404)">
    <rect x="0" y="0" width="232" height="54" rx="12" fill="#164e63"/>
    <text x="116" y="36" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="24" font-weight="bold" fill="#ffffff">HONK HONK</text>
  </g>
</svg>
