<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
  <title id="title">Picnic bonus</title>
  <desc id="desc">A picnic basket bonus for an eight-correct Garden Goose run.</desc>
  <rect width="720" height="520" fill="#dcfce7"/>
  <g transform="translate(220 140)">
    <rect x="60" y="80" width="160" height="100" rx="12" fill="#b45309" stroke="#164e63" stroke-width="8"/>
    <path d="M60 80 Q140 20 220 80" fill="none" stroke="#164e63" stroke-width="8"/>
    <rect x="90" y="40" width="100" height="50" rx="8" fill="#fef08a" stroke="#164e63" stroke-width="6"/>
    <circle cx="110" cy="120" r="14" fill="#ef4444" stroke="#164e63" stroke-width="4"/>
    <rect x="150" y="108" width="40" height="24" rx="4" fill="#ffffff" stroke="#164e63" stroke-width="4"/>
  </g>
  <g transform="translate(244 404)">
    <rect x="0" y="0" width="232" height="54" rx="12" fill="#164e63"/>
    <text x="116" y="36" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="24" font-weight="bold" fill="#ffffff">PICNIC BONUS</text>
  </g>
