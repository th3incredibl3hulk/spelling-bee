<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
  <title id="title">Mission victory</title>
  <desc id="desc">A full mission victory screen for a perfect spelling run.</desc>
  <rect width="720" height="520" fill="#0f172a"/>
  <rect x="32" y="32" width="656" height="456" rx="12" fill="#1e3a8a" stroke="#f97316" stroke-width="8"/>
  <g opacity="0.95">
    <rect x="94" y="88" width="532" height="110" rx="8" fill="#111827" stroke="#f8fafc" stroke-width="6"/>
