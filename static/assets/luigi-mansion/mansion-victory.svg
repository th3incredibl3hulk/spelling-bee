<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
  <title id="title">Mansion cleared</title>
  <desc id="desc">A mansion cleared victory screen for a perfect spelling run.</desc>
  <rect width="720" height="520" fill="#1e1b4b"/>
  <rect x="32" y="32" width="656" height="456" rx="16" fill="#312e81" stroke="#22c55e" stroke-width="8"/>
  <g opacity="0.95">
    <rect x="94" y="88" width="532" height="110" rx="12" fill="#111827" stroke="#a78bfa" stroke-width="6"/>
    <text x="360" y="134" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="38" fill="#ecfdf5">MANSION CLEARED</text>
    <text x="360" y="174" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="28" fill="#4ade80">10 / 10 SPELLING RUN</text>
  </g>
  <g transform="translate(280 230)">
    <path d="M80 120 L80 40 H120 L120 120 H160 L100 0 L40 120 Z" fill="#4c1d95" stroke="#a78bfa" stroke-width="6" stroke-linejoin="round"/>
    <rect x="52" y="120" width="96" height="72" rx="8" fill="#1f2937" stroke="#22c55e" stroke-width="6"/>
    <circle cx="100" cy="72" r="10" fill="#fde68a"/>
  </g>
  <g transform="translate(244 404)">
    <rect x="0" y="0" width="232" height="54" rx="10" fill="#111827" stroke="#22c55e" stroke-width="4"/>
    <text x="116" y="36" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="24" fill="#ecfdf5">ALL GHOSTS VACUUMED</text>
  </g>
</svg>
