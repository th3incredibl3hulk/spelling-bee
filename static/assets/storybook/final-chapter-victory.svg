<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
  <title id="title">Final chapter victory</title>
  <desc id="desc">A final chapter victory screen for a perfect Storybook Quest spelling run.</desc>
  <rect width="720" height="520" fill="#fff7ed"/>
  <rect x="32" y="32" width="656" height="456" rx="20" fill="#0f9f8f" stroke="#233047" stroke-width="8"/>
  <g opacity="0.95">
    <rect x="94" y="88" width="532" height="110" rx="14" fill="#fffaf0" stroke="#233047" stroke-width="8"/>
    <text x="360" y="134" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="36" font-weight="bold" fill="#233047">FINAL CHAPTER</text>
    <text x="360" y="174" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="28" font-weight="bold" fill="#b45309">10 / 10 SPELLING RUN</text>
  </g>
  <g transform="translate(180 250)">
    <circle cx="48" cy="48" r="40" fill="#fde68a" stroke="#233047" stroke-width="6"/>
    <circle cx="168" cy="48" r="40" fill="#b45309" stroke="#233047" stroke-width="6"/>
    <circle cx="288" cy="48" r="40" fill="#e0f2fe" stroke="#233047" stroke-width="6"/>
    <circle cx="408" cy="48" r="40" fill="#233047" stroke="#fffaf0" stroke-width="6"/>
  </g>
  <g transform="translate(244 404)">
    <rect x="0" y="0" width="232" height="54" rx="12" fill="#233047"/>
    <text x="116" y="36" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="24" font-weight="bold" fill="#ffffff">THE END</text>
  </g>
</svg>
